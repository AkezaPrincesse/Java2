<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Bill Approved</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0;padding:0}
.container{max-width:600px;margin:30px auto;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.header{background:#6a1b9a;color:#fff;padding:30px;text-align:center}
.body{padding:30px}
.info-box{background:#f3e5f5;border:2px solid #ba68c8;border-radius:8px;text-align:center;padding:20px;margin:20px 0}
.amount{font-size:28px;font-weight:bold;color:#6a1b9a}
.footer{background:#f8f8f8;padding:20px;text-align:center;color:#888;font-size:12px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>✔️ Bill Approved</h1>
    <p style="opacity:.9;margin:5px 0 0">WASAC &amp; REG Utility Billing</p>
  </div>
  <div class="body">
    <p>Dear <strong th:text="${name}">Customer</strong>,</p>
    <p>Your utility bill has been reviewed and <strong>approved</strong>. You can now proceed with payment.</p>
    <div class="info-box">
      <p style="margin:0 0 5px;color:#555">Bill No: <strong th:text="${billNumber}">-</strong></p>
      <div class="amount" th:text="${amount} + ' RWF'">0 RWF</div>
      <p style="margin:10px 0 0;color:#888;font-size:13px">Please pay on or before the due date to avoid penalties.</p>
    </div>
  </div>
  <div class="footer">
    <p>&copy; 2026 WASAC &amp; REG – Rwanda Utility Billing System</p>
  </div>
</div>
</body>
</html>
